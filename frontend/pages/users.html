<!-- users.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | Docky AI</title>

    <link rel="stylesheet" href="../css/users.css">
</head>
<body>

<div class="users_container">

    <header class="users_header">

        <h1>
            Gestión de Usuarios
        </h1>

    </header>

    <section class="user_form">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
        >

        <input
            type="email"
            id="correo"
            placeholder="Correo"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <select id="id_rol">

            <option value="">
                Seleccionar rol
            </option>

            <option value="1">
                Administrador
            </option>

            <option value="2">
                Usuario
            </option>

        </select>

        <button onclick="createUser()">
            Crear usuario
        </button>

    </section>

</div>

<script src="../js/users.js"></script>

</body>
</html>
