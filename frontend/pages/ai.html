<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Documental</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!--CONTENEDOR GENERAL-->
    <div class="app_container">

        <!--SIDEBAR-->
        <aside class="sidebar">

            <!--LOGO-->
            <div class="sidebar_header">
                <h1>Docky AI</h1>
            </div>
            <header class="header">
                        <h2>AI DOCUMENTAL</h2>
                        <p>Sistema de consulta documental integrado con IA</p>
                    </header>

            <!--BOTON NUEVO CHAT-->
            <button class="new_chat_button">
                + Nueva consulta
            </button>

            <!--HISTORIAL-->
            <div class="history_container">

        </aside>

            
                <!--Chat-->
                        <div class="chat_box" id="chatbox">

                <div class="welcome_message">
                    <h1>Hola 👋</h1>
                    <p>
                        Soy Docky, tu ayudante documental
                    </p>
                    <p>
                        ¿Qué duda tienes hoy?
                    </p>
                </div>

            </div>

            <!--Input-->
                <div class="chat_input_container">

                <div class="chat_input_wrapper">

                <input 
                    type="text" 
                    class="chat_input"
                    id="userInput"
                    placeholder="Escribe tu consulta..."
                >

                <button class="send_button" id="sendButton">
                ➤
                </button>

            </div>

        </div>


        </section>

    </div>

    <script src="../js/ai.js"></script>

</body>
</html>
